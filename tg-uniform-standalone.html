<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T&G Uniform Builder - Standalone</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar { height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto space-y-6">
        <!-- Header -->
        <header class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="bg-slate-900 text-white w-12 h-12 rounded-xl flex items-center justify-center font-bold text-xl shadow-lg">T&G</div>
                <div>
                    <h1 class="text-xl font-bold text-slate-900">نظام تكوين الطلبات الموحد</h1>
                    <p class="text-xs text-slate-500 font-medium">نسخة HTML/JS المباشرة</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <label class="text-sm font-bold text-slate-600">الشركة:</label>
                <select id="companySelect" class="bg-slate-50 border border-slate-300 rounded-lg px-4 py-2 text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none w-48">
                    <option value="T&G">T&G</option>
                    <option value="Phoenix">Phoenix</option>
                    <option value="Tsunami">Tsunami</option>
                    <option value="U">U</option>
                    <option value="Classy">Classy</option>
                </select>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
            <!-- Col 1: Products -->
            <div class="md:col-span-4 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
                <div class="bg-slate-50 p-4 border-b border-slate-200 font-bold text-sm">1. اختيار المنتج</div>
                <div id="categoryList" class="flex-1 overflow-y-auto p-2 space-y-1 max-h-[300px] md:max-h-[500px] custom-scrollbar">
                    <!-- Categories will be injected here -->
                </div>
                <div class="p-4 bg-slate-50 border-t">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">المنتج المحدد:</label>
                    <select id="productSelect" class="w-full p-2.5 text-sm border border-slate-200 rounded-xl font-bold bg-white focus:ring-2 focus:ring-indigo-500 outline-none">
                    </select>
                </div>
            </div>

            <!-- Col 2: Customization -->
            <div class="md:col-span-8 space-y-6">
                <!-- Design & Colors -->
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 space-y-6">
                    <div class="font-bold text-slate-800 border-b pb-3 mb-4">2. المواصفات والألوان</div>
                    
                    <div id="tshirtDetails" class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">نوع الكم</label>
                            <div class="flex gap-1 p-1 bg-slate-100 rounded-xl">
                                <button onclick="setSleeve('نص كم')" id="sleeve-half" class="flex-1 py-2 text-xs font-bold rounded-lg bg-white shadow-sm border border-slate-200 text-indigo-700">نص كم</button>
                                <button onclick="setSleeve('كم كامل')" id="sleeve-full" class="flex-1 py-2 text-xs font-bold rounded-lg text-slate-600 hover:bg-slate-200">كم كامل</button>
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">نوع القصة</label>
                            <select id="patternSelect" onchange="togglePatternDetails()" class="w-full p-2.5 text-sm border border-slate-200 rounded-lg bg-slate-50 font-bold outline-none">
                                <option value="منغير قصة">بدون قصة</option>
                                <option value="قصة">بقصة مخصصة</option>
                                <option value="تغير ياقة وسورة فقط">تغير ياقة وأسورة</option>
                            </select>
                        </div>
                    </div>

                    <div id="patternDetailsBox" class="hidden animate-pulse">
                        <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">تفاصيل القصة المخصصة</label>
                        <div class="relative">
                            <textarea id="patternDetails" class="w-full p-4 text-sm border-2 border-indigo-100 rounded-xl bg-indigo-50/20 min-h-[100px] outline-none" placeholder="اشرح القصة هنا..."></textarea>
                            <button onclick="startVoice('patternDetails')" class="absolute left-2 bottom-2 p-2 bg-white border rounded-lg text-slate-400 hover:text-indigo-600 shadow-sm"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg></button>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div class="p-4 border rounded-xl bg-slate-50 border-slate-200 flex justify-between items-center shadow-sm">
                            <span class="text-sm font-bold text-slate-700">لون التيشرت</span>
                            <input type="color" id="mainColor" value="#1e293b" class="h-10 w-10 cursor-pointer border-0 bg-transparent">
                        </div>
                        <div id="extraColors" class="hidden grid grid-cols-2 gap-2">
                            <input type="color" id="collarColor" title="لون الياقة" class="h-10 w-full cursor-pointer border rounded-lg bg-white p-1">
                            <input type="color" id="cuffColor" title="لون الأسورة" class="h-10 w-full cursor-pointer border rounded-lg bg-white p-1">
                        </div>
                    </div>
                </div>

                <!-- Logo Details -->
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 space-y-6">
                    <div class="font-bold text-slate-800 border-b pb-3 mb-4">3. اللوجو والعلامات</div>
                    <div class="flex gap-2 p-1 bg-slate-100 rounded-xl max-w-[200px]">
                        <button onclick="setLogo('تطريز')" id="logo-tatri" class="flex-1 py-2 text-xs font-bold rounded-lg bg-white shadow-sm border border-slate-200 text-indigo-700">تطريز</button>
                        <button onclick="setLogo('طباعة')" id="logo-tabaa" class="flex-1 py-2 text-xs font-bold rounded-lg text-slate-600 hover:bg-slate-200">طباعة</button>
                    </div>
                    <div class="space-y-4">
                        <div class="relative">
                            <label class="block text-xs font-bold text-slate-500 mb-1">لوجو الصدر</label>
                            <textarea id="logoChest" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl text-sm min-h-[80px]" placeholder="مثال: لوجو دائري جهة اليسار..."></textarea>
                            <button onclick="startVoice('logoChest')" class="absolute left-2 bottom-2 p-2 bg-white border rounded-lg text-slate-400"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg></button>
                        </div>
                        <div class="relative">
                            <label class="block text-xs font-bold text-slate-500 mb-1">لوجو الظهر</label>
                            <textarea id="logoBack" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl text-sm min-h-[80px]" placeholder="مثال: كلمة الشركة بخط كبير..."></textarea>
                            <button onclick="startVoice('logoBack')" class="absolute left-2 bottom-2 p-2 bg-white border rounded-lg text-slate-400"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg></button>
                        </div>
                    </div>
                </div>

                <!-- Footer Buttons -->
                <div class="bg-slate-900 rounded-2xl p-6 flex flex-col md:flex-row gap-4">
                    <button onclick="copyMockup()" class="flex-1 bg-white text-slate-900 py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-slate-100 transition-all">
                        📄 نسخ التفاصيل
                    </button>
                    <button onclick="sendWA('201158159732')" class="flex-1 bg-emerald-600 text-white py-3 rounded-xl font-bold flex flex-col items-center justify-center gap-1 hover:bg-emerald-700 transition-all">
                        <span>إرسال واتساب (أنس)</span>
                    </button>
                    <button onclick="sendWA('201094526896')" class="flex-1 bg-emerald-500 text-white py-3 rounded-xl font-bold flex flex-col items-center justify-center gap-1 hover:bg-emerald-600 transition-all">
                        <span>إرسال واتساب (عبدو)</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const categories = [
            { name: "التيشرتات", products: ["بولو بكم", "بولو نص كم", "ميلتون", "راوند بكم", "راوند نص كم"] },
            { name: "البنطلونات", products: ["بنطلون كلاسيك", "بنطلون شيف", "بنطلون جينز"] },
            { name: "جواكيت", products: ["جاكيت", "جاكيت شيف", "سويتشرت", "هودي"] },
            { name: "طبي", products: ["بالطو", "سكراب"] }
        ];

        let state = {
            category: categories[0],
            product: categories[0].products[0],
            sleeve: "نص كم",
            logo: "تطريز",
            pattern: "منغير قصة"
        };

        function init() {
            const catList = document.getElementById('categoryList');
            categories.forEach((cat, idx) => {
                const btn = document.createElement('button');
                btn.className = `w-full text-right p-3 text-sm rounded-lg font-bold transition-all ${idx === 0 ? 'bg-indigo-50 text-indigo-700 border-r-4 border-indigo-600' : 'text-slate-600 hover:bg-slate-50'}`;
                btn.innerText = cat.name;
                btn.onclick = () => selectCategory(cat, btn);
                catList.appendChild(btn);
            });
            updateProducts();
        }

        function selectCategory(cat, btn) {
            state.category = cat;
            document.querySelectorAll('#categoryList button').forEach(b => b.className = 'w-full text-right p-3 text-sm rounded-lg font-bold text-slate-600 hover:bg-slate-50');
            btn.className = 'w-full text-right p-3 text-sm rounded-lg font-bold bg-indigo-50 text-indigo-700 border-r-4 border-indigo-600';
            updateProducts();
        }

        function updateProducts() {
            const select = document.getElementById('productSelect');
            select.innerHTML = '';
            state.category.products.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p;
                opt.innerText = p;
                select.appendChild(opt);
            });
            state.product = state.category.products[0];
            
            // Show/Hide Sleeve details for T-shirts
            document.getElementById('tshirtDetails').style.display = (state.category.name === "التيشرتات") ? "grid" : "none";
        }

        function setSleeve(v) {
            state.sleeve = v;
            document.getElementById('sleeve-half').className = v === 'نص كم' ? "flex-1 py-2 text-xs font-bold rounded-lg bg-white shadow-sm border border-slate-200 text-indigo-700" : "flex-1 py-2 text-xs font-bold rounded-lg text-slate-600 hover:bg-slate-200";
            document.getElementById('sleeve-full').className = v === 'كم كامل' ? "flex-1 py-2 text-xs font-bold rounded-lg bg-white shadow-sm border border-slate-200 text-indigo-700" : "flex-1 py-2 text-xs font-bold rounded-lg text-slate-600 hover:bg-slate-200";
        }

        function setLogo(v) {
            state.logo = v;
            document.getElementById('logo-tatri').className = v === 'تطريز' ? "flex-1 py-2 text-xs font-bold rounded-lg bg-white shadow-sm border border-slate-200 text-indigo-700" : "flex-1 py-2 text-xs font-bold rounded-lg text-slate-600 hover:bg-slate-200";
            document.getElementById('logo-tabaa').className = v === 'طباعة' ? "flex-1 py-2 text-xs font-bold rounded-lg bg-white shadow-sm border border-slate-200 text-indigo-700" : "flex-1 py-2 text-xs font-bold rounded-lg text-slate-600 hover:bg-slate-200";
        }

        function togglePatternDetails() {
            state.pattern = document.getElementById('patternSelect').value;
            const isPattern = state.pattern !== "منغير قصة";
            document.getElementById('patternDetailsBox').style.display = state.pattern === "قصة" ? "block" : "none";
            document.getElementById('extraColors').style.display = isPattern ? "grid" : "none";
        }

        function buildMessage() {
            const company = document.getElementById('companySelect').value;
            const mainColor = document.getElementById('mainColor').value;
            const logoChest = document.getElementById('logoChest').value;
            const logoBack = document.getElementById('logoBack').value;
            const patternDetails = document.getElementById('patternDetails').value;
            
            let msg = `*تفاصيل موك اب جديد*\n\n`;
            msg += `🏢 الشركة: ${company}\n`;
            msg += `📦 المنتج: ${document.getElementById('productSelect').value} (${state.category.name})\n`;
            if(state.category.name === "التيشرتات") msg += `👕 النوع: ${state.sleeve}\n`;
            msg += `✂️ القصة: ${state.pattern}\n`;
            if(state.pattern === "قصة" && patternDetails) msg += `📝 التفاصيل: ${patternDetails}\n`;
            msg += `🎨 اللون: ${mainColor}\n`;
            msg += `🪡 اللوجو: ${state.logo}\n`;
            if(logoChest) msg += `📍 الصدر: ${logoChest}\n`;
            if(logoBack) msg += `📍 الظهر: ${logoBack}\n`;
            
            return msg;
        }

        function sendWA(phone) {
            const text = encodeURIComponent(buildMessage());
            window.open(`https://wa.me/${phone}?text=${text}`, '_blank');
        }

        function copyMockup() {
            navigator.clipboard.writeText(buildMessage());
            alert('تم نسخ التفاصيل بنجاح!');
        }

        function startVoice(id) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("المتصفح لا يدعم الصوت");
            const recognizer = new SpeechRecognition();
            recognizer.lang = 'ar-SA';
            recognizer.onresult = (e) => {
                document.getElementById(id).value += " " + e.results[0][0].transcript;
            };
            recognizer.start();
        }

        init();
    </script>
</body>
</html>
